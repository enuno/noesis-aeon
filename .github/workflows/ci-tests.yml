name: ci-tests

# Runs the committed script test suites on every PR that touches scripts/ or aeon.yml.
# These are the local tests authored alongside the hardening "easy wins" ported from
# aeon-dev (notify formatting, log compaction, output verifier, schedule clustering,
# skill pruning) — same gate shape as the other ci-*.yml. Keeps the extracted ./notify
# and the helper scripts honest.

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'aeon.yml'
      - '.github/workflows/ci-tests.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'aeon.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pip install pyyaml
      - name: notify_format unit tests
        run: python3 scripts/tests/test_notify_format.py
      - name: notify integration tests
        run: bash scripts/tests/test_notify.sh
      - name: log compaction tests
        run: python3 scripts/tests/test_compact_logs.py
      - name: output verifier tests
        run: python3 scripts/tests/test_verify_output.py
      - name: schedule clustering tests
        run: bash scripts/tests/test_schedule_clusters.sh
      - name: prune analyzer tests
        run: python3 scripts/tests/test_prune_skills.py
